{% extends 'base.html' %}

{% block title %}Log In - massxg{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
        font-weight: 500;
        font-size: 0.95rem;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-family: inherit;
        transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="container auth-container">
    <div class="glass-panel auth-card fade-in-up">
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>

        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
            <div
                style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; border: 1px solid rgba(239, 68, 68, 0.2);">
                Invalid username or password.
            </div>
            {% endif %}

            <div class="form-group">
                <label class="form-label" for="id_username">Username</label>
                <input type="text" name="username" class="form-control" autofocus required id="id_username">
            </div>

            <div class="form-group">
                <label class="form-label" for="id_password">Password</label>
                <input type="password" name="password" class="form-control" required id="id_password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>

            <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.95rem;">
                Don't have an account? <a href="{% url 'signup' %}" style="color: var(--accent-primary);">Sign up</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
