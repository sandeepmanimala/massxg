{% extends 'base.html' %}

{% block title %}Create Workflow - massxg{% endblock %}

{% block content %}
<div class="container fade-in-up" style="max-width: 600px; margin-top: 4rem;">
    <div class="glass-card" style="padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-diagram-project text-gradient" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h1 style="font-size: 2rem;">New Pipeline</h1>
            <p style="color: var(--text-secondary);">Initialize a new blank workflow canvas.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="title" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Workflow
                    Title</label>
                <input type="text" id="title" name="title" required class="form-control"
                    style="width: 100%; padding: 0.75rem 1rem; background: rgba(30, 41, 59, 0.5); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: var(--text-primary); outline: none;">
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="description"
                    style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Description
                    (Optional)</label>
                <textarea id="description" name="description" rows="3" class="form-control"
                    style="width: 100%; padding: 0.75rem 1rem; background: rgba(30, 41, 59, 0.5); border: 1px solid var(--glass-border); border-radius: var(--radius-md); color: var(--text-primary); outline: none; resize: vertical;"></textarea>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: var(--radius-md);">
                Create & Open Builder <i class="fa-solid fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
